<style>

/* SLIDE PANEL */
.slide-popup{
  position:fixed;
  top:0;
  right:-400px;
  width:350px;
  height:100%;
  background:#fff;
  box-shadow:-10px 0 30px rgba(0,0,0,0.2);
  transition:0.4s;
  z-index:9999;
  padding:25px;
}
.slide-popup.active{
  right:0;
}

/* OVERLAY */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  opacity:0;
  visibility:hidden;
  transition:0.3s;
}
.overlay.active{
  opacity:1;
  visibility:visible;
}

/* FORM */
.form-step{display:none;}
.form-step.active{display:block;}

input, select{
  width:100%;
  padding:12px;
  margin:10px 0;
}

/* PROGRESS */
.progress-bar{
  height:5px;
  background:#e5e7eb;
  border-radius:5px;
  margin-bottom:20px;
}
.progress-fill{
  height:5px;
  background:#0ea5e9;
  width:33%;
  border-radius:5px;
  transition:.3s;
}

/* BUTTON */
.next-btn{
  background:#0ea5e9;
  color:#fff;
  padding:12px;
  border:none;
  width:100%;
  cursor:pointer;
}

</style>

<!-- OVERLAY -->
<div id="overlay" class="overlay" onclick="closeSlide()"></div>

<!-- SLIDE FORM -->
<div id="slideForm" class="slide-popup">

<h2>Get Free Audit</h2>

<div class="progress-bar">
  <div id="progressFill" class="progress-fill"></div>
</div>

<!-- STEP 1 -->
<div class="form-step active">
<input id="name" placeholder="Your Name">
<button class="next-btn" onclick="nextStep(1)">Next</button>
</div>

<!-- STEP 2 -->
<div class="form-step">
<input id="email" placeholder="Your Email">
<button class="next-btn" onclick="nextStep(2)">Next</button>
</div>

<!-- STEP 3 -->
<div class="form-step">
<select id="budget">
<option>Select Monthly Budget</option>
<option>$1000-$3000</option>
<option>$3000-$8000</option>
<option>$8000+</option>
</select>
<button class="next-btn" onclick="submitForm()">Book Call</button>
</div>

</div>

<script>
let currentStep = 0;
const steps = document.querySelectorAll(".form-step");
const progress = document.getElementById("progressFill");

function openPopup(){
  document.getElementById("slideForm").classList.add("active");
  document.getElementById("overlay").classList.add("active");
}

function closeSlide(){
  document.getElementById("slideForm").classList.remove("active");
  document.getElementById("overlay").classList.remove("active");
}

function nextStep(step){
  steps[currentStep].classList.remove("active");
  currentStep++;
  steps[currentStep].classList.add("active");
  progress.style.width = (step+1)*33 + "%";
}

function submitForm(){
  const name=document.getElementById("name").value;
  const email=document.getElementById("email").value;
  const budget=document.getElementById("budget").value;

  if(!name || !email){
    alert("Please fill all fields");
    return;
  }

  // Here you can send data to backend / Google Sheets

  window.open("https://calendly.com/vinayyadav01992","_blank");
}
</script>
