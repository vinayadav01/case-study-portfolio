<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIM Tech Marketing | Generate Leads</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#eef2f7;color:#333}

/* NAVBAR */
.navbar{
  position:sticky; top:0;
  background:#0f172a;
  padding:15px 30px;
  display:flex; justify-content:space-between;
  z-index:999;
}
.navbar a{color:#fff;margin:0 10px;text-decoration:none;}
.navbar a:hover{color:#38bdf8}

/* HERO */
.hero{
  background:linear-gradient(135deg,#0ea5e9,#38bdf8);
  text-align:center;
  padding:120px 20px;
}
.hero h1{font-size:42px;margin-bottom:10px;}
.hero p{margin-bottom:20px;}

.hero button{
  padding:14px 30px;
  background:#000;
  color:#fff;
  border:none;
  border-radius:30px;
  cursor:pointer;
  animation:pulse 2s infinite;
}

/* PULSE */
@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.05);}
  100%{transform:scale(1);}
}

/* STATS */
.stats{
  display:flex;
  justify-content:center;
  gap:30px;
  padding:40px;
  flex-wrap:wrap;
}
.stat{
  background:#fff;
  padding:20px 30px;
  border-radius:12px;
  text-align:center;
  transition:.3s;
}
.stat:hover{transform:translateY(-5px);}
.stat h2{color:#0ea5e9}

/* SECTION */
.section{
  max-width:1200px;
  margin:auto;
  padding:70px 20px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:25px;
}

/* CARD */
.card{
  background:#fff;
  padding:25px;
  border-radius:14px;
  text-decoration:none;
  color:#333;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  transition:.4s;
  position:relative;
  overflow:hidden;
}
.card:hover{
  transform:translateY(-10px) scale(1.02);
}

/* PROCESS */
.process{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}
.step{
  background:#fff;
  padding:20px;
  border-radius:10px;
  text-align:center;
}

/* STICKY CTA */
.sticky-cta{
  position:fixed;
  bottom:20px;
  left:20px;
  background:linear-gradient(135deg,#0ea5e9,#38bdf8);
  color:#000;
  padding:14px 22px;
  border-radius:30px;
  font-weight:600;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  cursor:pointer;
  border:none;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:80px;
  right:20px;
  background:#25D366;
  color:#fff;
  padding:14px;
  border-radius:50%;
  text-decoration:none;
}

/* POPUP */
.popup{
  opacity:0;
  visibility:hidden;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:flex;
  justify-content:center;
  align-items:center;
  transition:.3s;
}

.popup.active{
  opacity:1;
  visibility:visible;
}

.popup-box{
  background:#fff;
  padding:25px;
  border-radius:12px;
  width:320px;
  text-align:center;
  position:relative;
  transform:scale(.8);
  transition:.3s;
}

.popup.active .popup-box{
  transform:scale(1);
}

.popup-box input{
  width:100%;
  margin:10px 0;
  padding:10px;
}

.popup-box span{
  position:absolute;
  top:10px;
  right:15px;
  cursor:pointer;
}

/* FOOTER */
.footer{
  background:#0f172a;
  color:#fff;
  text-align:center;
  padding:20px;
}
</style>
</head>

<body>

<div class="navbar">
  <div style="color:#fff;font-weight:600;">AIM Tech Marketing</div>
</div>

<div class="hero">
  <h1>I Generate High-Quality Leads Using Google Ads</h1>
  <p>Get consistent leads for your business in 30 days</p>
  <button onclick="openPopup()">🚀 Get Free Strategy</button>
</div>

<div class="stats">
  <div class="stat"><h2>5000+</h2><p>Leads Generated</p></div>
  <div class="stat"><h2>9+</h2><p>Industries</p></div>
  <div class="stat"><h2>6x</h2><p>ROAS</p></div>
</div>

<button class="sticky-cta" onclick="openPopup()">🚀 Get Free Audit</button>
<a href="https://wa.me/9589188668" class="whatsapp">💬</a>

<!-- POPUP -->
<div id="leadPopup" class="popup">
<div class="popup-box">
<span onclick="closePopup()">×</span>
<h2>Get Free Strategy Call</h2>
<input placeholder="Your Name">
<input placeholder="Your Email">
<input placeholder="Your Phone">
<button onclick="openCalendly()">Book Call</button>
</div>
</div>

<div class="footer">© 2026 Vinay Yadav</div>

<script>
function openPopup(){
  document.getElementById("leadPopup").classList.add("active");
}

function closePopup(){
  document.getElementById("leadPopup").classList.remove("active");
}

function openCalendly(){
  window.open("https://calendly.com/vinayyadav01992","_blank");
}

/* LOAD SAFE */
window.addEventListener("load",function(){
  setTimeout(openPopup,8000);
});
</script>

</body>
</html>
