<style>

/* PREMIUM STICKY CTA */
.sticky-cta{
  position:fixed;
  bottom:20px;
  left:20px;
  background:linear-gradient(135deg,#0ea5e9,#38bdf8);
  color:#000;
  padding:14px 22px;
  border-radius:30px;
  font-weight:600;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  cursor:pointer;
  border:none;
  transition:.3s;
  z-index:999;
}

.sticky-cta:hover{
  transform:translateY(-4px);
  box-shadow:0 15px 30px rgba(0,0,0,0.25);
}

/* POPUP CLOSE BUTTON FIX */
.popup-box span{
  position:absolute;
  top:10px;
  right:15px;
  cursor:pointer;
  font-size:18px;
}

.popup-box{
  position:relative;
